<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plexd</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 340px;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            background: #1a1a1a;
            color: #fff;
        }

        /* Header */
        .header {
            padding: 10px 14px;
            background: #0a0a0a;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #555;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .status-dot.ok { background: #4ade80; }
        .status-dot.err { background: #f87171; }
        .logo { font-size: 15px; font-weight: 700; flex: 1; }
        .logo span { color: #6366f1; }
        .header-status { font-size: 11px; color: #666; }

        /* Status bar */
        .status-bar {
            padding: 6px 14px;
            font-size: 12px;
            text-align: center;
            display: none;
            flex-shrink: 0;
        }
        .status-bar.ok { display: block; background: #1e3a2f; color: #4ade80; }
        .status-bar.err { display: block; background: #3b1c1c; color: #f87171; }

        /* Content */
        .content {
            padding: 10px;
            flex: 1;
            max-height: 360px;
            overflow-y: auto;
        }

        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            padding: 4px 4px 6px;
        }
        .section-label.streams { color: #4ade80; }

        /* Video items */
        .video-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: #252525;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .video-item:hover { background: #333; }
        .video-item.selected { background: #3730a3; }

        .video-item input[type="checkbox"] {
            width: 15px; height: 15px;
            accent-color: #6366f1;
            flex-shrink: 0;
            pointer-events: none;
        }
        .video-info { flex: 1; min-width: 0; }
        .video-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 12px;
        }
        .video-meta {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge-type {
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-hls { background: #166534; color: #4ade80; }
        .badge-dash { background: #1e3a5f; color: #60a5fa; }
        .badge-mp4 { background: #333; color: #aaa; }

        .copy-btn {
            background: #333; border: none;
            color: #aaa; cursor: pointer;
            font-size: 13px; padding: 4px 8px;
            border-radius: 4px;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .copy-btn:hover { background: #444; color: #fff; }
        .copy-btn.copied { background: #166534; color: #4ade80; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 30px 16px;
            color: #666;
        }
        .empty-state h3 { color: #888; margin-bottom: 6px; font-size: 14px; }

        .loading { text-align: center; padding: 30px; color: #666; }

        /* Actions */
        .actions {
            padding: 10px;
            border-top: 1px solid #333;
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .btn {
            flex: 1;
            padding: 9px 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-send {
            background: #6366f1;
            color: #fff;
        }
        .btn-send:hover { background: #5558e3; }
        .btn-send:disabled { background: #333; color: #555; cursor: not-allowed; }
        .btn-open {
            background: #333;
            color: #ccc;
        }
        .btn-open:hover { background: #444; }
    </style>
</head>
<body>
    <div class="header">
        <div class="status-dot" id="statusDot"></div>
        <div class="logo">Plex<span>d</span></div>
        <div class="header-status" id="headerStatus">Checking...</div>
    </div>

    <div class="status-bar" id="statusBar"></div>

    <div class="content" id="content">
        <div class="loading">Scanning for videos...</div>
    </div>

    <div class="actions">
        <button class="btn btn-open" id="openBtn">Open Plexd</button>
        <button class="btn btn-send" id="sendBtn" disabled>Send All</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
