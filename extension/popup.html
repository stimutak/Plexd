<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plexd</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 340px;
            display: flex;
            flex-direction: column;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            background: #0c0b10;
            color: #ede8e0;
        }

        /* Header */
        .header {
            padding: 10px 14px;
            background: #06050a;
            border-bottom: 1px solid rgba(237, 232, 224, 0.07);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(237, 232, 224, 0.35);
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .status-dot.ok { background: #5cc98e; }
        .status-dot.err { background: #c95555; }
        .logo { font-size: 15px; font-weight: 700; flex: 1; }
        .logo span { color: #c9566d; }
        .header-status { font-size: 11px; color: rgba(237, 232, 224, 0.35); }

        /* Status bar */
        .status-bar {
            padding: 6px 14px;
            font-size: 12px;
            text-align: center;
            display: none;
            flex-shrink: 0;
        }
        .status-bar.ok { display: block; background: rgba(92, 201, 142, 0.2); color: #5cc98e; }
        .status-bar.err { display: block; background: rgba(201, 85, 85, 0.15); color: #c95555; }

        /* Content */
        .content {
            padding: 10px;
            flex: 1;
            max-height: 360px;
            overflow-y: auto;
        }
        .content::after {
            content: '';
            position: sticky;
            bottom: 0;
            display: block;
            height: 24px;
            background: linear-gradient(transparent, #0c0b10);
            pointer-events: none;
        }

        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(237, 232, 224, 0.35);
            padding: 4px 4px 6px;
        }
        .section-label.streams { color: #5cc98e; }

        /* Video items */
        .video-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: #13111a;
            border-radius: 6px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .video-item:hover { background: #23202e; }
        .video-item.selected { background: rgba(201, 86, 109, 0.2); }
        .video-item:focus-visible { box-shadow: 0 0 0 2px #c9566d; outline: none; }

        .video-item input[type="checkbox"] {
            width: 15px; height: 15px;
            accent-color: #c9566d;
            flex-shrink: 0;
            pointer-events: none;
        }
        .video-info { flex: 1; min-width: 0; }
        .video-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 12px;
        }
        .video-meta {
            font-size: 10px;
            color: rgba(237, 232, 224, 0.35);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge-type {
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-hls { background: rgba(92, 201, 142, 0.2); color: #5cc98e; }
        .badge-dash { background: rgba(85, 130, 200, 0.2); color: #7ba8d4; }
        .badge-mp4 { background: #1b1822; color: rgba(237, 232, 224, 0.65); }

        .copy-btn {
            background: #1b1822; border: none;
            color: rgba(237, 232, 224, 0.65); cursor: pointer;
            font-size: 13px; padding: 4px 8px;
            border-radius: 6px;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .copy-btn:hover { background: #23202e; color: #ede8e0; }
        .copy-btn.copied { background: rgba(92, 201, 142, 0.2); color: #5cc98e; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 30px 16px;
            color: rgba(237, 232, 224, 0.35);
        }
        .empty-state h3 { color: rgba(237, 232, 224, 0.35); margin-bottom: 6px; font-size: 14px; }

        .loading { text-align: center; padding: 30px; color: rgba(237, 232, 224, 0.35); }

        /* Actions */
        .actions {
            padding: 10px;
            border-top: 1px solid rgba(237, 232, 224, 0.14);
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .btn {
            flex: 1;
            padding: 9px 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-send {
            background: #c9566d;
            color: #ede8e0;
        }
        .btn-send:hover { background: #b04a5f; }
        .btn-send:disabled { background: #1b1822; color: rgba(237, 232, 224, 0.35); cursor: not-allowed; }
        .btn-open {
            background: #1b1822;
            color: rgba(237, 232, 224, 0.65);
        }
        .btn-open:hover { background: #23202e; }

        .btn:focus-visible, .video-item:focus-visible, .copy-btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px #c9566d;
        }

        .mux-warning {
            margin-top: 3px;
            padding: 2px 6px;
            background: rgba(212, 168, 83, 0.15);
            color: #d4a853;
            border-radius: 3px;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="status-dot" id="statusDot"></div>
        <div class="logo">Plex<span>d</span></div>
        <div class="header-status" id="headerStatus">Checking...</div>
    </div>

    <div class="status-bar" id="statusBar"></div>

    <div class="content" id="content">
        <div class="loading">Scanning for videos...</div>
    </div>

    <div class="actions">
        <button class="btn btn-open" id="openBtn">Open Plexd</button>
        <button class="btn btn-send" id="sendBtn" disabled>Send All</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
