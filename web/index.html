<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0c0b10">

    <title>Plexd - Multiplex Video Streams</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/plexd.css?v=106">
</head>
<body>
    <div class="plexd-app header-hidden">
        <div id="mode-indicator" class="plexd-mode-indicator"></div>

        <!-- Header Toggle Button (always visible) -->
        <button id="header-toggle" class="plexd-header-toggle" title="Toggle toolbar [H]">
            ☰
        </button>

        <!-- Header / Toolbar -->
        <header class="plexd-header plexd-header-hidden">
            <div class="plexd-logo">Plex<span>d</span></div>

            <div class="plexd-input-group">
                <input
                    type="url"
                    id="stream-url-input"
                    class="plexd-input"
                    placeholder="Enter video stream URL (e.g., https://example.com/video.mp4)"
                    autocomplete="off"
                    spellcheck="false"
                >
                <button id="add-stream-btn" class="plexd-button plexd-button-primary">
                    Add Stream
                </button>
            </div>

            <div class="plexd-stats">
                <div class="plexd-stat">
                    <span>Streams:</span>
                    <span id="stream-count" class="plexd-stat-value">0</span>
                </div>
                <div id="filter-indicator" class="plexd-filter-indicator" style="display: none;">
                    <span id="filter-stars"></span>
                    <span id="filter-count" class="plexd-filter-count"></span>
                </div>

                <!-- View Toggle (Favorites / All / Star Ratings) -->
                <div class="plexd-view-toggle">
                    <button id="view-favorites-btn" class="plexd-view-btn view-favorites" onclick="PlexdApp.setViewMode('favorites')" title="Show favorites only [`]">★ <span id="favorites-count" class="badge"></span></button>
                    <button id="view-all-btn" class="plexd-view-btn active" onclick="PlexdApp.setViewMode('all')" title="Show all streams [0] [V to cycle]">All</button>
                    <button id="view-1-btn" class="plexd-view-btn rating-1" onclick="PlexdApp.setViewMode(1)" title="Slot 1 [double-tap 1]">1 <span id="rating-1-count" class="badge"></span></button>
                    <button id="view-2-btn" class="plexd-view-btn rating-2" onclick="PlexdApp.setViewMode(2)" title="Slot 2 [double-tap 2]">2 <span id="rating-2-count" class="badge"></span></button>
                    <button id="view-3-btn" class="plexd-view-btn rating-3" onclick="PlexdApp.setViewMode(3)" title="Slot 3 [double-tap 3]">3 <span id="rating-3-count" class="badge"></span></button>
                    <button id="view-4-btn" class="plexd-view-btn rating-4" onclick="PlexdApp.setViewMode(4)" title="Slot 4 [double-tap 4]">4 <span id="rating-4-count" class="badge"></span></button>
                    <button id="view-5-btn" class="plexd-view-btn rating-5" onclick="PlexdApp.setViewMode(5)" title="Slot 5 [double-tap 5]">5 <span id="rating-5-count" class="badge"></span></button>
                    <button id="view-6-btn" class="plexd-view-btn rating-6" onclick="PlexdApp.setViewMode(6)" title="Slot 6 [double-tap 6]">6 <span id="rating-6-count" class="badge"></span></button>
                    <button id="view-7-btn" class="plexd-view-btn rating-7" onclick="PlexdApp.setViewMode(7)" title="Slot 7 [double-tap 7]">7 <span id="rating-7-count" class="badge"></span></button>
                    <button id="view-8-btn" class="plexd-view-btn rating-8" onclick="PlexdApp.setViewMode(8)" title="Slot 8 [double-tap 8]">8 <span id="rating-8-count" class="badge"></span></button>
                    <button id="view-9-btn" class="plexd-view-btn rating-9" onclick="PlexdApp.setViewMode(9)" title="Slot 9 [double-tap 9]">9 <span id="rating-9-count" class="badge"></span></button>
                </div>

                <!-- Layout Modes -->
                <button id="tetris-btn" class="plexd-button plexd-button-secondary plexd-tetris-btn" onclick="PlexdApp.toggleTetrisMode()" title="Tetris layout [T] - eliminates black bars">T</button>
                <button id="coverflow-btn" class="plexd-button plexd-button-secondary plexd-coverflow-btn" onclick="PlexdApp.toggleCoverflowMode()" title="Coverflow layout [O] - z-depth overlapping">C</button>
                <button id="wall-btn" class="plexd-button plexd-button-secondary plexd-wall-btn" onclick="PlexdApp.cycleWallMode()" title="Wall mode [W] - Strips/Crop/Spotlight">W</button>
                <button id="smart-zoom-btn" class="plexd-button plexd-button-secondary" onclick="PlexdApp.toggleFaceDetection()" title="Smart Zoom [A] - auto-detect faces">👤</button>

                <!-- Global Controls -->
                <button id="pause-all-btn" class="plexd-button plexd-button-secondary" onclick="PlexdApp.togglePauseAll()" title="Pause/Play all [P]">⏸</button>
                <button id="mute-all-btn" class="plexd-button plexd-button-secondary" onclick="PlexdApp.toggleMuteAll()" title="Mute all streams">🔇</button>
                <button id="audio-focus-btn" class="plexd-button plexd-button-secondary" onclick="PlexdApp.toggleAudioFocus()" title="Audio focus mode [N] - solo selected">🎧</button>
                <button id="clean-mode-btn" class="plexd-button plexd-button-secondary" onclick="PlexdApp.toggleCleanMode()" title="Hide per-stream controls [Shift+H]">👁</button>
                <button id="fullscreen-btn" class="plexd-button plexd-button-secondary" onclick="PlexdApp.toggleGlobalFullscreen()" title="True fullscreen [F]">⛶</button>
                <button id="cast-btn" class="plexd-button plexd-button-secondary" onclick="PlexdApp.toggleCast()" title="Cast selected stream [Shift+P]">📺</button>
                <button id="rewind-all-btn" class="plexd-button plexd-button-secondary" onclick="PlexdApp.rewindAll()" title="Rewind all to start [{]">⏮</button>
                <button id="random-seek-all-btn" class="plexd-button plexd-button-secondary" onclick="PlexdApp.randomSeekAll()" title="Random seek all streams [\\]">🔀</button>

                <!-- Panels -->
                <button onclick="PlexdApp.togglePanel('streams-panel')" class="plexd-button plexd-button-secondary" title="Active streams list [S]">Strms</button>
                <button onclick="PlexdApp.togglePanel('saved-panel')" class="plexd-button plexd-button-secondary" title="Saved sets">Sets</button>
                <button onclick="PlexdApp.togglePanel('history-panel')" class="plexd-button plexd-button-secondary" title="History [Opt+S]">Hist</button>
                <button id="tags-btn" class="plexd-button plexd-button-secondary" onclick="PlexdApp.togglePanel('tags-panel')" title="Browse & load tagged clips [U]">Tags</button>
                <button id="performers-btn" class="plexd-button plexd-button-secondary" onclick="PlexdApp.togglePanel('performers-panel')" title="Browse performers [Y]">Perf</button>
            </div>
        </header>

        <!-- Queue Panel -->
        <aside id="queue-panel" class="plexd-panel">
            <div class="plexd-panel-header">
                <h3>Queue</h3>
                <div class="plexd-panel-actions">
                    <button onclick="PlexdApp.playAllFromQueue()" class="plexd-button-small" title="Play all">Play</button>
                    <button onclick="PlexdApp.togglePanel('queue-panel')" class="plexd-panel-close">&times;</button>
                </div>
            </div>
            <div id="queue-list" class="plexd-panel-content">
                <div class="plexd-panel-empty">Queue is empty</div>
            </div>
        </aside>

        <!-- Tags Panel -->
        <aside id="tags-panel" class="plexd-panel plexd-tags-panel">
            <div class="plexd-panel-header">
                <h3>Tags <span id="tags-selected-count" class="badge"></span></h3>
                <div class="plexd-panel-actions">
                    <button class="plexd-button-small" onclick="PlexdApp.clearTagSelection()">Clear</button>
                    <button id="tags-load-btn" class="plexd-button-small" onclick="PlexdApp.loadFilteredStreams()">Load</button>
                    <button onclick="PlexdApp.togglePanel('tags-panel')" class="plexd-panel-close">&times;</button>
                </div>
            </div>
            <input id="tags-search" class="plexd-panel-search" type="text" placeholder="Search tags..." autocomplete="off">
            <div id="tags-list" class="plexd-panel-content">
                <div class="plexd-panel-empty">Loading tags...</div>
            </div>
        </aside>

        <!-- Performers Panel -->
        <aside id="performers-panel" class="plexd-panel plexd-performers-panel">
            <div class="plexd-panel-header">
                <h3>Performers <span id="performers-selected-count" class="badge"></span></h3>
                <div class="plexd-panel-actions">
                    <button class="plexd-button-small" onclick="PlexdApp.clearPerformerSelection()">Clear</button>
                    <button class="plexd-button-small" onclick="PlexdApp.loadFilteredStreams()">Load</button>
                    <button onclick="PlexdApp.togglePanel('performers-panel')" class="plexd-panel-close">&times;</button>
                </div>
            </div>
            <input id="performers-search" class="plexd-panel-search" type="text" placeholder="Search performers..." autocomplete="off">
            <div id="performers-list" class="plexd-panel-content">
                <div class="plexd-panel-empty">Loading performers...</div>
            </div>
        </aside>

        <!-- History Panel -->
        <aside id="history-panel" class="plexd-panel plexd-tags-panel">
            <div class="plexd-panel-header">
                <h3>History</h3>
                <div class="plexd-panel-actions">
                    <button onclick="PlexdApp.clearHistory()" class="plexd-button-small" title="Clear">Clear</button>
                    <button onclick="PlexdApp.togglePanel('history-panel')" class="plexd-panel-close">&times;</button>
                </div>
            </div>
            <input type="text" id="history-search" class="plexd-panel-search" placeholder="Search history..." autocomplete="off" spellcheck="false">
            <div id="history-list" class="plexd-panel-content">
                <div class="plexd-panel-empty">No history yet</div>
            </div>
        </aside>

        <!-- Saved Combinations Panel -->
        <aside id="saved-panel" class="plexd-panel plexd-tags-panel">
            <div class="plexd-panel-header">
                <h3>Sets</h3>
                <div class="plexd-panel-actions">
                    <button id="save-combo-btn" class="plexd-button-small" title="Save current streams to browser">Save</button>
                    <button onclick="PlexdApp.saveFavorites()" class="plexd-button-small plexd-save-favorites-btn" title="Save favorites as a set">★Fav</button>
                    <button onclick="PlexdApp.exportCombinations()" class="plexd-button-small" title="Export to file">Exp</button>
                    <button onclick="PlexdApp.importCombinations()" class="plexd-button-small" title="Import from file">Imp</button>
                    <button onclick="PlexdApp.showManageStoredFilesModal()" class="plexd-button-small" title="Manage stored local files">Files</button>
                    <button onclick="window.open('/hls-manager.html', '_blank')" class="plexd-button-small" title="Manage HLS transcodes">HLS</button>
                    <button onclick="PlexdApp.togglePanel('saved-panel')" class="plexd-panel-close">&times;</button>
                </div>
            </div>
            <input type="text" id="sets-search" class="plexd-panel-search" placeholder="Search sets..." autocomplete="off" spellcheck="false">
            <div id="combinations-list" class="plexd-panel-content">
                <div class="plexd-panel-empty">No saved combinations</div>
            </div>
        </aside>

        <!-- Streams Panel (slide-out list of all active streams) -->
        <aside id="streams-panel" class="plexd-panel plexd-tags-panel plexd-streams-panel">
            <div class="plexd-panel-header">
                <h3>Streams</h3>
                <div class="plexd-panel-actions">
                    <button onclick="PlexdApp.showAllStreams()" class="plexd-button-small" title="Show all hidden streams">👁All</button>
                    <button onclick="PlexdApp.removeDuplicateStreams()" class="plexd-button-small" title="Remove duplicate streams (=)">Dup</button>
                    <button onclick="PlexdApp.reloadAllStreams()" class="plexd-button-small" title="Reload all streams">↻All</button>
                    <button onclick="PlexdApp.closeAllStreams()" class="plexd-button-small plexd-btn-danger" title="Close all streams">✕All</button>
                    <button onclick="PlexdApp.togglePanel('streams-panel')" class="plexd-panel-close">&times;</button>
                </div>
            </div>
            <input type="text" id="streams-search" class="plexd-panel-search" placeholder="Search streams..." autocomplete="off" spellcheck="false">
            <div id="streams-list" class="plexd-panel-content">
                <div class="plexd-panel-empty">No active streams</div>
            </div>
        </aside>

        <!-- Video Grid Container -->
        <main id="plexd-container">
            <!-- Streams are added here dynamically -->
        </main>

        <!-- Keyboard Shortcuts Hint -->
        <div class="plexd-shortcuts">
            <span class="plexd-shortcuts-quick">
                <kbd>Arrows</kbd> Navigate
                <kbd>Z</kbd> Focus
                <kbd>F</kbd> Fullscreen
                <kbd>Space</kbd> Play
                <kbd>1-9</kbd> Slot
                <kbd>?</kbd> Hide
            </span>
            <button class="plexd-shortcuts-more" onclick="PlexdApp.showShortcutsModal()" title="Show all keyboard shortcuts">All Keys...</button>
        </div>
    </div>

    <!-- Cast SDK (Chrome only, non-blocking) -->
    <script src="//www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1" async></script>

    <!-- HLS.js for streaming support -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>

    <!-- Scripts -->
    <script src="js/grid.js?v=103"></script>
    <script src="js/stream.js?v=105"></script>
    <script src="js/moments.js?v=105"></script>
    <script src="js/cast.js?v=105"></script>
    <script src="js/app.js?v=106"></script>
</body>
</html>
