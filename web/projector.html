<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plexd Projector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        body.idle { cursor: none; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .title-overlay {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 16px 24px; color: #fff; font: 18px/1.3 -apple-system, sans-serif;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            opacity: 1; transition: opacity 0.5s; pointer-events: none; z-index: 10;
        }
        .title-overlay.hidden { opacity: 0; }
    </style>
</head>
<body>
    <div class="title-overlay" id="titleBar"></div>
    <video id="video" autoplay muted playsinline></video>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
    <script>
        var video = document.getElementById('video');
        var titleBar = document.getElementById('titleBar');
        var hls = null;
        var titleTimer = null;
        var idleTimer = null;

        function showTitle(text) {
            titleBar.textContent = text || '';
            titleBar.classList.remove('hidden');
            clearTimeout(titleTimer);
            titleTimer = setTimeout(function() { titleBar.classList.add('hidden'); }, 3000);
        }

        function loadVideo(url, time, title) {
            console.log('[Projector] loadVideo:', url, 'time:', time, 'title:', title);
            if (hls) { hls.destroy(); hls = null; }
            video.muted = true;
            if (title) document.title = 'Plexd Projector \u2014 ' + title;
            showTitle(title || '');

            if (url && url.includes('.m3u8') && Hls.isSupported()) {
                hls = new Hls({ capLevelToPlayerSize: false });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.ERROR, function(e, data) {
                    console.error('[Projector] HLS error:', data.type, data.details);
                });
                hls.on(Hls.Events.MANIFEST_PARSED, function(e, data) {
                    if (data.levels && data.levels.length > 0) hls.currentLevel = data.levels.length - 1;
                    if (time) video.currentTime = time;
                    video.play();
                });
            } else if (url) {
                video.src = url;
                video.play().catch(function() {});
                video.addEventListener('loadedmetadata', function onMeta() {
                    video.removeEventListener('loadedmetadata', onMeta);
                    if (time) video.currentTime = time;
                    video.play().catch(function() {});
                });
            }
        }

        // Listen for commands from the main Plexd window
        window.addEventListener('message', function(e) {
            if (e.origin !== window.location.origin) return;
            if (e.data && e.data.cmd === 'load') {
                loadVideo(e.data.url, e.data.time, e.data.title);
            }
        });

        // Double-click toggles native fullscreen
        document.addEventListener('dblclick', function() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Keyboard/remote controls — handle locally where possible, forward rest to main app
        document.addEventListener('keydown', function(e) {
            var origin = window.location.origin;

            // Local-only controls (instant, no round-trip)
            switch (e.key) {
                case 'ArrowRight':
                case '.':
                    e.preventDefault();
                    video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
                    return;
                case 'ArrowLeft':
                case ',':
                    e.preventDefault();
                    video.currentTime = Math.max(0, video.currentTime - 10);
                    return;
                case '>':
                    e.preventDefault();
                    video.currentTime = Math.min(video.duration || 0, video.currentTime + 60);
                    return;
                case '<':
                    e.preventDefault();
                    video.currentTime = Math.max(0, video.currentTime - 60);
                    return;
                case 'm':
                case 'M':
                    e.preventDefault();
                    video.muted = !video.muted;
                    showTitle(video.muted ? 'Muted' : 'Unmuted');
                    return;
                case 'f':
                case 'F':
                    e.preventDefault();
                    if (document.fullscreenElement) document.exitFullscreen();
                    else document.documentElement.requestFullscreen();
                    return;
                case 'Escape':
                    if (document.fullscreenElement) document.exitFullscreen();
                    return;
            }

            // Forward all other keys to main app (ratings, navigation, etc.)
            if (window.opener) {
                e.preventDefault();
                window.opener.postMessage({
                    cmd: 'projector-key',
                    key: e.key,
                    shiftKey: e.shiftKey,
                    altKey: e.altKey,
                    ctrlKey: e.ctrlKey,
                    metaKey: e.metaKey
                }, origin);
            }
        });

        // Auto-hide cursor after 3s idle
        document.addEventListener('mousemove', function() {
            document.body.classList.remove('idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(function() { document.body.classList.add('idle'); }, 3000);
        });

        // Signal when video ends so main app can auto-advance
        video.addEventListener('ended', function() {
            if (window.opener) {
                window.opener.postMessage({ cmd: 'projector-ended' }, window.location.origin);
            }
        });

        // Signal ready to opener (retry a few times in case of race)
        function signalReady() {
            if (window.opener) {
                window.opener.postMessage({ cmd: 'projector-ready' }, window.location.origin);
            }
        }
        signalReady();
        setTimeout(signalReady, 500);
        setTimeout(signalReady, 1500);

        // Also check URL params for initial load (fallback if postMessage fails)
        var params = new URLSearchParams(window.location.search);
        if (params.get('url')) {
            loadVideo(params.get('url'), parseFloat(params.get('t')) || 0, params.get('title') || '');
        }
    </script>
</body>
</html>
